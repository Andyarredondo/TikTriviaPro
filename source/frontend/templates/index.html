<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>{{ title }}</title>

    <link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

<div class="page">

    <header class="header">

        <h1>TikTrivia Pro</h1>

        <div class="version">

            Version {{ version }}

        </div>

    </header>

    <div class="layout">

        <!-- LEFT PANEL -->

        <aside class="left-panel">

            <h2>Contestants</h2>

            <div id="contestants">

                Waiting for players...

            </div>

        </aside>

        <!-- CENTER PANEL -->

        <main class="center-panel">

            <div class="board-header">

                <div>

                    <strong>Board</strong>

                    <span id="board-id">None Loaded</span>

                </div>

                <div>

                    <strong>Category</strong>

                    <span id="category">---</span>

                </div>

            </div>

            <div class="question">

                <h2 id="survey-question">

                    Click "Next Board"

                </h2>

            </div>

            <div class="answers">

                <div class="answer-row">

                    <span class="rank">1</span>

                    <span id="answer1">██████████████████</span>

                </div>

                <div class="answer-row">

                    <span class="rank">2</span>

                    <span id="answer2">██████████████████</span>

                </div>

                <div class="answer-row">

                    <span class="rank">3</span>

                    <span id="answer3">██████████████████</span>

                </div>

                <div class="answer-row">

                    <span class="rank">4</span>

                    <span id="answer4">██████████████████</span>

                </div>

                <div class="answer-row">

                    <span class="rank">5</span>

                    <span id="answer5">██████████████████</span>

                </div>

            </div>

            <div class="strikes">

                <span id="strike1">◯</span>

                <span id="strike2">◯</span>

                <span id="strike3">◯</span>

            </div>

        </main>

        <!-- RIGHT PANEL -->

        <aside class="right-panel">

            <h2>Host Controls</h2>

            <button id="next-board">

                Next Board

            </button>

            <button id="open-question">

                Open Question

            </button>

            <button id="close-question">

                Close Question

            </button>

            <button id="reset-board">

                Reset Board

            </button>

            <hr>

            <h3>Status</h3>

            <pre id="status">

Ready

            </pre>

        </aside>

    </div>

</div>

<script src="/static/js/game.js"></script>

</body>

</html>
