<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>{{ title }}</title>

    <link
        rel="stylesheet"
        href="/static/css/main.css"
    >

</head>

<body>

    <main class="container">

        <div class="card">

            <div class="status">

                <div class="dot"></div>

                <span>Application Running</span>

            </div>

            <h1>{{ title }}</h1>

            <h2>Professional TikTok LIVE Trivia Control System</h2>

            <div class="version">

                Version {{ version }}

            </div>

            <hr>

            <div class="grid">

                <div class="panel">

                    <h3>Backend</h3>

                    <p>FastAPI</p>

                </div>

                <div class="panel">

                    <h3>Database</h3>

                    <p>SQLite</p>

                </div>

                <div class="panel">

                    <h3>Chat</h3>

                    <p>TikFinity</p>

                </div>

                <div class="panel">

                    <h3>Status</h3>

                    <p>Ready</p>

                </div>

            </div>

        </div>

    </main>

<script src="/static/js/main.js"></script>

</body>

</html>
